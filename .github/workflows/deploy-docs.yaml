name: Deploy Docs

on:
  # Runs when a new version tag is pushed
  push:
    tags:
      - 'v*'
    branches:
      - main

  # Validates doc builds on pull requests (without deploying)
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job — always runs, so PRs and main pushes verify the docs still build.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Zig compiler
        uses: mlugg/setup-zig@v2
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Install doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen
      - name: Generate documentation
        env:
          PROJECT_NUMBER: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: ./docs/generate.sh
      - name: Setup Pages
        if: github.ref_type == 'tag'
        uses: actions/configure-pages@v5
      - name: Upload artifact
        if: github.ref_type == 'tag'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/gh-pages

  # Deployment job — only runs for tag pushes.
  deploy:
    if: github.ref_type == 'tag'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
